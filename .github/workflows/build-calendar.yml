name: Build UCI Calendar

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt

      - name: Ensure calendar folder exists
        run: mkdir -p calendar

      - name: Run scripts
        run: |
          python scraper/scrape.py
          python scraper/parse.py
          python scraper/generate_ics.py

      - name: Debug: list files
        run: ls -R .

      - name: Commit updated ICS
        run: |
          if [ -f calendar/uci-2026.ics ]; then
            git config user.name "GitHub Action"
            git config user.email "actions@github.com"
            git pull
            git add calendar/uci-2026.ics
            git commit -m "Update ICS" || echo "No changes"
            git push
          else
            echo "ICS file missing - skipping commit"
            exit 1
          fi
